version: "3.9"

services:
  ppm-infotech-app:
    build: .
    container_name: ppm-infotech-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    depends_on:
      - ppm-infotech-app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always